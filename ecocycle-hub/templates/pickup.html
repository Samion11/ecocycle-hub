{% extends 'base.html' %}

{% block title %}Waste Pickup | EcoCycle Hub{% endblock %}

{% block content %}
<div class="form-container">
    <div style="text-align: center; margin-bottom: 2rem;">
        <h1>Request Waste Pickup 🗓️</h1>
        <p>Have plastic waste? We'll come to your doorstep to pick it up.</p>
    </div>

    <form method="POST" action="{{ url_for('pickup') }}">
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" class="form-control" required placeholder="John Doe">
        </div>

        <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone" class="form-control" required pattern="\d{10}" minlength="10" maxlength="10" title="Please enter exactly 10 digits" placeholder="1234567890">
        </div>

        <div class="form-group">
            <label for="address">Pickup Address</label>
            <textarea id="address" name="address" class="form-control" rows="4" required placeholder="123 Eco Street, Green City"></textarea>
        </div>

        <button type="submit" class="btn" style="width: 100%; font-size: 1.1rem;">Schedule Pickup</button>
    </form>
</div>
{% endblock %}
